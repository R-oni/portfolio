<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Seu Negócio</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Serif+Display:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard">
        <!-- Signature Section -->
        <section class="signature-section">
            <!-- Barras decorativas animadas -->
            <div class="sig-bars" aria-hidden="true">
                <span style="--h:28px;--d:0s"></span>
                <span style="--h:44px;--d:.12s"></span>
                <span style="--h:20px;--d:.24s"></span>
                <span style="--h:56px;--d:.36s"></span>
                <span style="--h:34px;--d:.48s"></span>
                <span style="--h:48px;--d:.60s"></span>
                <span style="--h:22px;--d:.72s"></span>
                <span style="--h:62px;--d:.84s"></span>
                <span style="--h:38px;--d:.96s"></span>
                <span style="--h:50px;--d:1.08s"></span>
                <span style="--h:26px;--d:1.20s"></span>
                <span style="--h:42px;--d:1.32s"></span>
                <span style="--h:32px;--d:1.44s"></span>
                <span style="--h:54px;--d:1.56s"></span>
                <span style="--h:18px;--d:1.68s"></span>
                <span style="--h:46px;--d:1.80s"></span>
                <span style="--h:30px;--d:1.92s"></span>
                <span style="--h:58px;--d:2.04s"></span>
                <span style="--h:24px;--d:2.16s"></span>
                <span style="--h:40px;--d:2.28s"></span>
                <span style="--h:52px;--d:2.40s"></span>
                <span style="--h:36px;--d:2.52s"></span>
                <span style="--h:64px;--d:2.64s"></span>
                <span style="--h:28px;--d:2.76s"></span>
                <span style="--h:44px;--d:2.88s"></span>
                <span style="--h:20px;--d:3.00s"></span>
                <span style="--h:56px;--d:3.12s"></span>
                <span style="--h:34px;--d:3.24s"></span>
                <span style="--h:48px;--d:3.36s"></span>
                <span style="--h:22px;--d:3.48s"></span>
                <span style="--h:60px;--d:3.60s"></span>
                <span style="--h:38px;--d:3.72s"></span>
            </div>
            <div class="signature-container">
                <img src="assinatura.gif" alt="Assinatura" class="signature-img" style="display: block;">
                <p class="tagline">Informação é <span class="gold-text">Ouro!</span></p>
                <div class="client-logo-box">
                    <img id="clientLogo" class="client-logo" src="" alt="Logo do cliente">
                </div>
            </div>
        </section>

        <!-- Header -->
        <header class="header">
            <div class="header-info"></div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- KPI Cards -->
            <section class="kpi-grid">
                <div class="kpi-mini fade-in">
                    <div class="kpi-mini-label">Faturamento</div>
                    <div class="kpi-mini-value" id="kpi-faturamento">R$ 0</div>
                    <div class="kpi-mini-change" id="change-faturamento">+12.5%</div>
                </div>

                <div class="kpi-mini fade-in" style="animation-delay: 0.1s">
                    <div class="kpi-mini-label">Lucro</div>
                    <div class="kpi-mini-value" id="kpi-lucro">R$ 0</div>
                    <div class="kpi-mini-change" id="change-lucro">+0%</div>
                </div>

                <div class="kpi-mini fade-in" style="animation-delay: 0.2s">
                    <div class="kpi-mini-label">Ticket Médio</div>
                    <div class="kpi-mini-value" id="kpi-ticket">R$ 0</div>
                    <div class="kpi-mini-change" id="change-ticket">+4.2%</div>
                </div>

                <div class="kpi-mini fade-in" style="animation-delay: 0.3s">
                    <div class="kpi-mini-label">Clientes</div>
                    <div class="kpi-mini-value" id="kpi-clientes">0</div>
                    <div class="kpi-mini-change" id="change-clientes">+6.7%</div>
                </div>
            </section>

            <!-- Month Selector -->
            <section class="selector-section fade-in" style="animation-delay: 0.4s">
                <label for="month-select">Selecione o mês:</label>
                <select id="month-select" class="month-select">
                </select>
            </section>

            <!-- Charts -->
            <section class="charts-grid" id="charts-container">
                <!-- Renderizado dinamicamente por renderCustomCharts() -->
            </section>

            <!-- Comentários Gerais -->
            <section class="comentarios-gerais fade-in" style="animation-delay: 0.8s">
                <div class="chart-mini">
                    <h3>Comentários Gerais</h3>
                    <p class="comentarios-texto" id="comentarios-texto"></p>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Róni Ricardo &copy; 2026</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
